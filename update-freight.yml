# ============================================================
#  Repo path: .github/workflows/update-freight.yml
#  Runs daily, pulls market freight rates, commits freight.json.
#  One-time setup:
#   1) Get a Freightos API key (developer.freightos.com).
#   2) Repo → Settings → Secrets and variables → Actions →
#      New repository secret named FREIGHTOS_API_KEY.
#  That's it. The key stays encrypted in GitHub and never
#  reaches the published page.
# ============================================================
name: Update freight reference

on:
  schedule:
    - cron: "0 11 * * *"     # 11:00 UTC daily (~6am US Central). Adjust as you like.
  workflow_dispatch: {}       # adds a "Run workflow" button for manual refreshes

permissions:
  contents: write             # lets the job commit freight.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market rates
        env:
          FREIGHTOS_API_KEY: ${{ secrets.FREIGHTOS_API_KEY }}
        run: node scripts/fetch-freight.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet freight.json; then
            echo "No change in freight.json"
          else
            git config user.name  "freight-bot"
            git config user.email "actions@users.noreply.github.com"
            git add freight.json
            git commit -m "Update freight reference ($(date -u +%Y-%m-%d))"
            git push
          fi
